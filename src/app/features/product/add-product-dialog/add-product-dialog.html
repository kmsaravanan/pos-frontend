<h2 mat-dialog-title>Add New Product</h2>
<mat-dialog-content>
  <form [formGroup]="productForm">
    <mat-form-field appearance="outline" style="width: 100%; margin-top: 10px;">
      <mat-label>Product Name</mat-label>
      <input matInput formControlName="name" required>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>SKU / Item Code</mat-label>
      <input matInput formControlName="sku" required>
    </mat-form-field>

    <div style="display: flex; gap: 10px;">
      <mat-form-field appearance="outline" style="flex: 1;">
        <mat-label>Price ($)</mat-label>
        <input matInput type="number" formControlName="price" required>
      </mat-form-field>
      <mat-form-field appearance="outline" style="flex: 1;">
        <mat-label>GST (%)</mat-label>
        <input matInput type="number" formControlName="gstPercentage" required>
      </mat-form-field>
    </div>

    <div style="display: flex; gap: 10px;">
      <mat-form-field appearance="outline" style="flex: 1;">
        <mat-label>Opening Stock</mat-label>
        <input matInput type="number" formControlName="stockQuantity" required>
      </mat-form-field>
      <mat-form-field appearance="outline" style="flex: 1;">
        <mat-label>Min Stock Threshold</mat-label>
        <input matInput type="number" formControlName="minStockThreshold" required>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Category</mat-label>
      <input matInput formControlName="categoryName" placeholder="e.g., Tractor, Lubricants">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="productForm.invalid" (click)="onSave()">Save Product</button>
</mat-dialog-actions>
